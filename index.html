<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Heart for GH Pages</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background-color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #ff4d4d; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 1px solid #333; background: #000; box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }
    </style>
</head>
<body>

    <h1>Python x JS Canvas Heart</h1>
    <canvas id="heartCanvas" width="400" height="400"></canvas>

    <script type="py">
        import math
        from js import document, window

        canvas = document.getElementById("heartCanvas")
        ctx = canvas.getContext("2d")
        
        def draw_heart():
            ctx.clearRect(0, 0, 400, 400)
            ctx.strokeStyle = "#ff4d4d"
            ctx.lineWidth = 2
            ctx.beginPath()

            # Heart math parameters
            t = 0
            while t < 2 * math.pi:
                # Parametric equations for a heart shape
                x = 16 * math.sin(t)**3
                y = 13 * math.cos(t) - 5 * math.cos(2*t) - 2 * math.cos(3*t) - math.cos(4*t)
                
                # Scale and center the heart on the canvas
                canvas_x = 200 + x * 10
                canvas_y = 180 - y * 10
                
                if t == 0:
                    ctx.moveTo(canvas_x, canvas_y)
                else:
                    ctx.lineTo(canvas_x, canvas_y)
                
                t += 0.05
            
            ctx.stroke()
            ctx.fillStyle = "#ff4d4d"
            ctx.fill()

        draw_heart()
    </script>
</body>
</html>
